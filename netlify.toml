[build]
  command = "pip install -r requirements.txt"
  functions = "functions"
  publish = "."

[build.environment]
  PYTHON_VERSION = "3.11.8"
  PIP_CACHE_DIR = "./.pip-cache"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
